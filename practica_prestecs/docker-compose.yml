version: '3.8'

services:

  c_bd3:
    image: mariadb:10.6
    container_name: c_bd3
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_dawe
      MYSQL_USER: user_dawe
      MYSQL_PASSWORD: pwd

    volumes:
      - db_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d

  c_web:
    build: .
    container_name: c_web

    ports:
      - "8080:80"

    volumes:
      - ./app:/var/www/html

    depends_on:
      - c_bd3

volumes:
  db_data: